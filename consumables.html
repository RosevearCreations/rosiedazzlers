<!-- /consumables.html
     REPLACE ENTIRE FILE

     Purpose:
     - Shows your "Products / Consumables" list from JSON (images + categories + Amazon search links)
     - Fixes the “only search bar shows” problem by:
       1) Loading from multiple possible JSON paths (fallbacks)
       2) Validating each item has an image URL and title
     - Includes category filter + search + modal image preview
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Detailing Consumables | Rosie Dazzlers</title>
  <link rel="canonical" href="https://www.rosiedazzlers.ca/consumables" />
  <meta name="description" content="See the soaps, compounds, towels, applicators, and other consumables Rosie Dazzlers uses for detailing work." />
  <link rel="stylesheet" href="/assets/site.css?v=20260309w" />
  <style>
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    @media (max-width:1100px){ .grid3{grid-template-columns:repeat(2,1fr)} }
    @media (max-width:980px){ .grid3{grid-template-columns:1fr} }

    .muted{color:rgba(234,242,255,.62)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}

    .cardImg{
      width:100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
    }
    .tag{display:inline-flex;align-items:center;gap:6px;padding:2px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);font-size:.9rem}

    .modalBack{position:fixed; inset:0; background:rgba(0,0,0,.70); display:none; align-items:center; justify-content:center; z-index:9999; padding:18px;}
    .modal{max-width:1100px; width:100%; border:1px solid rgba(255,255,255,.12); background:rgba(10,14,24,.96); border-radius:18px; padding:14px;}
    .modal img{width:100%; height:auto; border-radius:14px; border:1px solid rgba(255,255,255,.10)}
    .modalHead{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}

    .inputs input,.inputs select{min-width:220px}
  </style>
</head>

<body>
  <div class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <img data-logo alt="Rosie Dazzlers logo" />
        <strong>Rosie Dazzlers</strong>
      </a>
      <button class="btn small ghost nav-toggle" id="navToggle" type="button" aria-expanded="false">Menu</button>
      <div class="nav-links" id="navLinks"></div>
      <a class="btn primary" href="/book">Book now</a>
    </div>
  </div>

  <div class="container">
    <div class="panel">
      <h1 style="margin:0 0 6px">Consumables</h1>
      <p class="kicker" style="margin:0">
        Products and consumables we use on mobile detailing jobs. (Amazon links are search links for convenience.)
      </p>

      <div class="hr"></div>

      <div class="row inputs">
        <input id="q" type="search" placeholder="Search consumables (name/category)..." />
        <select id="cat"></select>
        <select id="sort">
          <option value="title_asc">Sort: Title (A→Z)</option>
          <option value="title_desc">Sort: Title (Z→A)</option>
          <option value="category_asc">Sort: Category</option>
          <option value="size_desc">Sort: File size (largest)</option>
          <option value="size_asc">Sort: File size (smallest)</option>
        </select>
        <button class="btn ghost" id="clearBtn" type="button">Clear</button>
      </div>

      <div id="status" class="notice" style="display:none;margin-top:12px"></div>
    </div>

    <div class="section">
      <div id="grid" class="grid3"></div>
    </div>

    <div class="footer" data-footer></div>
  </div>

  <!-- MODAL -->
  <div class="modalBack" id="modalBack" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modalHead">
        <strong id="modalTitle">Preview</strong>
        <button class="btn ghost" id="modalCloseBtn" type="button">Close</button>
      </div>
      <img id="modalImg" alt="Preview image" />
    </div>
  </div>

  <script type="module">
    // Try multiple JSON paths
    const PUBLIC_CATALOG_URL = "/api/catalog_public?catalog_type=consumables";
    const CANDIDATE_JSON = [
      "/data/rosie_products_catalog_r2_corrected.json",
      "/data/rosie_products_catalog_rebuilt.json",
      "/data/rosie_products_catalog.json",
    ];

    // If an item lacks r2_url, we can rebuild from this base + path.
    const R2_PUBLIC_DEV_BASE = "https://pub-3293bca3c49a49a7bd30ea4469874d80.r2.dev";

    const qs = (s) => document.querySelector(s);

    function escapeHtml(s){
      return String(s || "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;").replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function prettyCategory(cat){
      return String(cat || "other")
        .replaceAll("_"," ")
        .replace(/\b\w/g, (m)=>m.toUpperCase());
    }

    function amazonSearchUrl(query){
      const q = (query || "").trim();
      if (!q) return "";
      return `https://www.amazon.ca/s?k=${encodeURIComponent(q)}`;
    }

    async function fetchJsonStrict(url){
      const res = await fetch(url, { cache:"no-store" });
      const text = await res.text();
      try { return JSON.parse(text); }
      catch {
        const head = text.slice(0, 120).replace(/\s+/g, " ");
        throw new Error(`Expected JSON but got: ${head}`);
      }
    }

    async function loadPublicThenFallback(urls){
      try {
        const data = await fetchJsonStrict(`${PUBLIC_CATALOG_URL}&v=${Date.now()}`);
        if (data && Array.isArray(data.items)) return { url: PUBLIC_CATALOG_URL, data: data.items };
      } catch {}

      return loadFirstWorkingJson(urls);
    }

    async function loadFirstWorkingJson(urls){
      let lastErr = null;
      for (const u of urls) {
        try {
          const data = await fetchJsonStrict(`${u}?v=${Date.now()}`);
          if (Array.isArray(data)) return { url: u, data };
          throw new Error("JSON loaded but is not an array.");
        } catch (e) {
          lastErr = e;
        }
      }
      throw lastErr || new Error("No JSON source worked.");
    }

    function renderStars(value){ const rounded = Math.round(Number(value||0)); return rounded ? "★".repeat(rounded) + "☆".repeat(5-rounded) : ""; }

    function normalizeItem(it){
      const title = it.title || it.filename || it.original || it.sanitized || "(untitled)";
      const category = it.category || "other";
      const bytes = Number(it.bytes || 0);

      let img = it.r2_url || "";
      if (!img && it.path) {
        img = `${R2_PUBLIC_DEV_BASE}/${encodeURI(it.path).replaceAll("#","%23")}`;
      }

      const amazonQuery = it.amazon_query || title;
      const amazon = amazonSearchUrl(amazonQuery);

      return {
        title,
        category,
        bytes,
        img,
        amazon,
        amazonQuery,
        path: it.path || "",
        filename: it.filename || "",
        rating: it.overall_rating ?? null,
        brand: it.brand || null,
        model: it.model || null,
        location_label: it.location_label || null
      };
    }

    // Modal
    function openModal(title, imgUrl){
      qs("#modalTitle").textContent = title;
      qs("#modalImg").src = imgUrl;
      qs("#modalBack").style.display = "flex";
    }
    function closeModal(){ qs("#modalBack").style.display = "none"; qs("#modalImg").src = ""; }
    qs("#modalCloseBtn").addEventListener("click", closeModal);
    qs("#modalBack").addEventListener("click", (e)=>{ if(e.target.id==="modalBack") closeModal(); });

    function showStatus(msg, kind=""){
      const el = qs("#status");
      el.style.display = "block";
      el.className = "notice " + (kind || "");
      el.textContent = msg;
    }
    function hideStatus(){ qs("#status").style.display = "none"; }

    let all = [];
    let filtered = [];

    function buildCategoryOptions(items){
      const sel = qs("#cat");
      const counts = new Map();
      for (const it of items) {
        counts.set(it.category, (counts.get(it.category) || 0) + 1);
      }
      const cats = Array.from(counts.keys()).sort((a,b)=>a.localeCompare(b));

      sel.innerHTML = [
        `<option value="">All categories (${items.length})</option>`,
        ...cats.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(prettyCategory(c))} (${counts.get(c)})</option>`)
      ].join("");
    }

    function applySort(items){
      const mode = qs("#sort").value;
      const arr = [...items];

      const byTitle = (a,b)=>String(a.title).localeCompare(String(b.title));
      const byCat = (a,b)=>String(a.category).localeCompare(String(b.category)) || byTitle(a,b);

      if (mode === "title_asc") arr.sort(byTitle);
      if (mode === "title_desc") arr.sort((a,b)=>byTitle(b,a));
      if (mode === "category_asc") arr.sort(byCat);
      if (mode === "size_desc") arr.sort((a,b)=>(b.bytes||0)-(a.bytes||0));
      if (mode === "size_asc") arr.sort((a,b)=>(a.bytes||0)-(b.bytes||0));

      return arr;
    }

    function applyFilters(){
      const q = (qs("#q").value || "").trim().toLowerCase();
      const cat = (qs("#cat").value || "").trim();

      let out = all;
      if (cat) out = out.filter(i => i.category === cat);

      if (q) {
        out = out.filter(i => {
          const hay = `${i.title} ${i.category} ${i.filename} ${i.path}`.toLowerCase();
          return hay.includes(q);
        });
      }

      filtered = applySort(out);
      renderGrid(filtered);
    }

    function renderGrid(items){
      const grid = qs("#grid");
      grid.innerHTML = "";

      if (!items.length) {
        grid.innerHTML = `<div class="notice warn">No consumables match the current filters.</div>`;
        return;
      }

      for (const it of items) {
        const el = document.createElement("div");
        el.className = "panel";

        const img = it.img || "";
        const cat = prettyCategory(it.category);
        const amazon = it.amazon || "";

        el.innerHTML = `
          <img class="cardImg" alt="${escapeHtml(it.title)}" />
          <div style="margin-top:10px;display:flex;justify-content:space-between;gap:10px;align-items:flex-start">
            <div>
              <h3 style="margin:0">${escapeHtml(it.title)}</h3>
              <div class="muted">${escapeHtml(cat)}</div>
            </div>
            <div style="text-align:right">
              <span class="tag">${escapeHtml(it.category)}</span>
            </div>
          </div>

          <div class="row" style="margin-top:12px">
            <button class="btn ghost" type="button" data-preview>Preview</button>
            ${amazon ? `<a class="btn primary" href="${escapeHtml(amazon)}" target="_blank" rel="noopener">Amazon search</a>` : ``}
          </div>

          <div class="muted" style="margin-top:10px;font-size:.92rem">
            ${it.bytes ? `${Math.round(it.bytes/1024)} KB` : ""} ${it.path ? `• <span class="mono">${escapeHtml(it.path)}</span>` : ""}
          </div>
        `;

        const imgEl = el.querySelector("img");
        imgEl.src = img || "";
        imgEl.loading = "lazy";
        imgEl.decoding = "async";
        imgEl.onerror = () => { imgEl.style.display = "none"; };

        el.querySelector("[data-preview]").addEventListener("click", () => {
          if (img) openModal(it.title, img);
        });

        grid.appendChild(el);
      }
    }

    // Wire inputs
    qs("#q").addEventListener("input", applyFilters);
    qs("#cat").addEventListener("change", applyFilters);
    qs("#sort").addEventListener("change", applyFilters);
    qs("#clearBtn").addEventListener("click", () => {
      qs("#q").value = "";
      qs("#cat").value = "";
      qs("#sort").value = "title_asc";
      applyFilters();
    });

    // Load JSON
    try {
      showStatus("Loading consumables catalog…");
      const { url, data } = await loadPublicThenFallback(CANDIDATE_JSON);

      all = data.map(normalizeItem).filter(x => x.img && x.title);
      buildCategoryOptions(all);

      hideStatus();
      applyFilters();

      showStatus(`Loaded ${all.length} items from ${url}.`, "ok");
      setTimeout(hideStatus, 1500);
    } catch (e) {
      showStatus(`Consumables catalog failed to load: ${e.message || e}`, "bad");
      qs("#grid").innerHTML = `<div class="notice bad">Upload a valid products catalog JSON to <span class="mono">/data/rosie_products_catalog_r2_corrected.json</span> (or /data/rosie_products_catalog.json).</div>`;
    }
  </script>

  <script type="module" src="/assets/chrome.js?v=20260309w"></script>
</body>
</html>
