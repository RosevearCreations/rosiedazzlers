<!-- /admin-booking.html
     REPLACE ENTIRE FILE

     Admin booking controls:
      - Loads a booking row by ID (from ?bid=... or typed)
      - Uses /api/admin/bookings (next30 + latest100) to find the booking
      - Updates booking via /api/admin/booking_update:
          set_job_status, set_progress_enabled, regen_progress_token
      - Shows/copies customer links:
          /progress?token=...
          /complete?token=...
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Booking Controls | Rosie Dazzlers</title>
  <meta name="description" content="Admin booking controls for Rosie Dazzlers." />
  <link rel="stylesheet" href="/assets/site.css?v=20260310b" />
  <style>
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    @media (max-width:980px){ .grid2,.grid3{grid-template-columns:1fr} }

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
    .muted{color:rgba(234,242,255,.62)}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:2px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);font-size:.9rem}
    .pill.ok{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.10)}
    .pill.warn{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.10)}
    .pill.bad{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.10)}
    pre{white-space:pre-wrap;word-break:break-word;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:10px}
    a.inline{color:rgba(234,242,255,.90)}
  </style>
</head>

<body>
  <div class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <img data-logo alt="Rosie Dazzlers logo" />
        <strong>Rosie Dazzlers</strong>
      </a>
      <button class="btn small ghost nav-toggle" id="navToggle" type="button" aria-expanded="false">Menu</button>
      <div class="nav-links" id="navLinks"></div>
      <a class="btn primary" href="/admin">Admin</a>
    </div>
  </div>

  <div class="container">
    <div class="panel">
      <h1 style="margin:0 0 6px">Booking Controls</h1>
      <p class="kicker" style="margin:0">Manage a booking, generate customer links, and update job status.</p>

      <div class="hr"></div>

      <div class="row">
        <label style="display:flex;flex-direction:column;gap:6px;min-width:260px">
          <span class="muted">Admin password</span>
          <input id="pw" type="password" placeholder="Enter admin password…" />
        </label>

        <label style="display:flex;flex-direction:column;gap:6px;min-width:420px;flex:1">
          <span class="muted">Booking ID (uuid)</span>
          <input id="bid" class="mono" type="text" placeholder="d751e9f0-717d-4ab6-a2be-dba309006b76" />
        </label>

        <div class="row" style="align-items:flex-end">
          <button class="btn primary" id="loadBtn" type="button">Load booking</button>
          <button class="btn ghost" id="savePwBtn" type="button">Save password</button>
          <a class="btn ghost" href="/admin">Back to Admin</a>
        </div>
      </div>

      <div id="status" class="notice" style="display:none;margin-top:12px"></div>
    </div>

    <div class="section grid2">
      <!-- LEFT: BOOKING DETAILS -->
      <div class="panel">
        <h2 style="margin-top:0">Details</h2>
        <div id="details" class="notice warn">Load a booking to see details.</div>

        <div class="hr"></div>

        <h2 style="margin-top:0">Customer Links</h2>
        <div id="links" class="notice warn">Enable progress to generate links.</div>

        <div class="row" style="margin-top:12px">
          <button class="btn ghost" id="copyProgressBtn" type="button" disabled>Copy progress link</button>
          <button class="btn ghost" id="copyCompleteBtn" type="button" disabled>Copy completion link</button>
          <a class="btn ghost" id="openProgressBtn" href="#" target="_blank" rel="noopener" style="display:none">Open progress</a>
        </div>

        <div class="row" style="margin-top:12px">
          <a class="btn ghost" id="uploadBtn" href="#">Upload photos</a>
          <a class="btn ghost" id="postProgressBtn" href="#">Post update</a>
          <a class="btn ghost" id="assignBtn" href="#">Assign staff</a>
        </div>
      </div>

      <!-- RIGHT: CONTROLS -->
      <div class="panel">
        <h2 style="margin-top:0">Controls</h2>

        <div class="grid2">
          <div>
            <label for="job_status">Job status</label>
            <select id="job_status">
              <option value="scheduled">scheduled</option>
              <option value="in_progress">in_progress</option>
              <option value="completed">completed</option>
              <option value="cancelled">cancelled</option>
            </select>
          </div>

          <div>
            <label for="progress_enabled">Progress enabled</label>
            <select id="progress_enabled">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </div>
        </div>

        <div class="row" style="margin-top:12px">
          <button class="btn primary" id="saveStatusBtn" type="button" disabled>Save status</button>
          <button class="btn primary" id="saveProgressBtn" type="button" disabled>Save progress setting</button>
          <button class="btn ghost" id="regenTokenBtn" type="button" disabled>Regenerate token</button>
        </div>

        <div class="hr"></div>

        <h2 style="margin-top:0">Raw booking JSON</h2>
        <pre id="raw" class="mono">{}</pre>
      </div>
    </div>

    <div class="footer" data-footer></div>
  </div>

  <script type="module">
    const qs = (s) => document.querySelector(s);

    function escapeHtml(s){
      return String(s || "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function showStatus(msg, kind=""){
      const el = qs("#status");
      el.style.display = "block";
      el.className = "notice " + (kind || "");
      el.textContent = msg;
    }
    function hideStatus(){ qs("#status").style.display = "none"; }

    function getPw(){ return (qs("#pw").value || "").trim(); }
    function getBid(){ return (qs("#bid").value || "").trim(); }

    function prettyPkg(code){
      const map = {
        premium_wash: "Premium Wash",
        basic_detail: "Basic Detail",
        complete_detail: "Complete Detail",
        interior_detail: "Interior Detail",
        exterior_detail: "Exterior Detail",
      };
      return map[code] || code || "";
    }

    function fmtMoneyCents(cents){
      if (cents == null) return "—";
      return new Intl.NumberFormat("en-CA", { style:"currency", currency:"CAD" }).format(Number(cents)/100);
    }

    async function postJson(url, payload){
      const res = await fetch(url, {
        method: "POST",
        headers: { "content-type":"application/json" },
        body: JSON.stringify(payload),
      });
      const out = await res.json().catch(()=>null);
      return { ok: res.ok, status: res.status, out };
    }

    // Save PW in local storage
    try {
      const saved = localStorage.getItem("rosie_admin_pw") || "";
      if (saved) qs("#pw").value = saved;
    } catch {}

    qs("#savePwBtn").addEventListener("click", () => {
      const pw = getPw();
      if (!pw) return showStatus("Enter password first.", "bad");
      try {
        localStorage.setItem("rosie_admin_pw", pw);
        showStatus("Saved password on this device.", "ok");
        setTimeout(hideStatus, 1200);
      } catch {
        showStatus("Could not save password (browser storage blocked).", "bad");
      }
    });

    // Prefill bid from querystring
    (function prefill(){
      const p = new URLSearchParams(location.search);
      const bid = (p.get("bid") || "").trim();
      if (bid) qs("#bid").value = bid;
    })();

    let currentBooking = null;
    let currentLinks = null;

    function setButtonsEnabled(on){
      qs("#saveStatusBtn").disabled = !on;
      qs("#saveProgressBtn").disabled = !on;
      qs("#regenTokenBtn").disabled = !on;
    }

    function updateDeepLinks(bid){
      qs("#uploadBtn").href = `/admin-upload.html?bid=${encodeURIComponent(bid)}`;
      qs("#postProgressBtn").href = `/admin-progress.html?bid=${encodeURIComponent(bid)}`;
      qs("#assignBtn").href = `/admin-assign.html?bid=${encodeURIComponent(bid)}`;
    }

    function renderBooking(b){
      currentBooking = b;

      // controls
      if (b.job_status) qs("#job_status").value = b.job_status;
      qs("#progress_enabled").value = (b.progress_enabled === true) ? "true" : "false";

      // details
      const vehicle = b.vehicle || null;
      const vehicleLine = vehicle
        ? `${vehicle.year || ""} ${vehicle.make || ""} ${vehicle.model || ""}`.trim()
        : "";

      qs("#details").className = "notice";
      qs("#details").innerHTML = `
        <div><strong>${escapeHtml(b.customer_name || "")}</strong> — ${escapeHtml(b.customer_email || "")}</div>
        ${b.customer_phone ? `<div class="muted">${escapeHtml(b.customer_phone)}</div>` : ``}
        <div class="hr"></div>
        <div><strong>${escapeHtml(prettyPkg(b.package_code))}</strong> (${escapeHtml(b.vehicle_size || "")})</div>
        ${vehicleLine ? `<div class="muted">Vehicle: ${escapeHtml(vehicleLine)}</div>` : ``}
        <div class="muted">Date: ${escapeHtml(b.service_date || "")} • Slot: ${escapeHtml(b.start_slot || "")} • Duration: ${escapeHtml(String(b.duration_slots || ""))}</div>
        <div class="muted">Area: ${escapeHtml(b.service_area || "")}</div>
        <div class="muted">Address: ${escapeHtml(b.address_line1 || "")} ${b.city ? "• "+escapeHtml(b.city) : ""} ${b.postal_code ? "• "+escapeHtml(b.postal_code) : ""}</div>
        <div class="hr"></div>
        <div class="muted">Subtotal: <strong>${fmtMoneyCents(b.subtotal_cents)}</strong> • Total: <strong>${fmtMoneyCents(b.price_total_cents)}</strong> • Deposit: <strong>${fmtMoneyCents(b.deposit_cents)}</strong></div>
        <div class="muted">Status: <strong>${escapeHtml(b.status || "")}</strong> • Job: <strong>${escapeHtml(b.job_status || "")}</strong></div>
        ${b.assigned_staff_name ? `<div class="muted">Staff: <strong>${escapeHtml(b.assigned_staff_name)}</strong></div>` : ``}
      `;

      // raw
      qs("#raw").textContent = JSON.stringify(b, null, 2);

      setButtonsEnabled(true);
      updateDeepLinks(b.id);
    }

    function renderLinks(links){
      currentLinks = links;

      const area = qs("#links");
      if (!links) {
        area.className = "notice warn";
        area.textContent = "Enable progress to generate links.";
        qs("#copyProgressBtn").disabled = true;
        qs("#copyCompleteBtn").disabled = true;
        qs("#openProgressBtn").style.display = "none";
        return;
      }

      area.className = "notice ok";
      area.innerHTML = `
        <div><strong>Progress:</strong> <a class="inline mono" href="${escapeHtml(links.progress_url)}" target="_blank" rel="noopener">${escapeHtml(links.progress_url)}</a></div>
        <div style="margin-top:8px"><strong>Completion:</strong> <a class="inline mono" href="${escapeHtml(links.complete_url)}" target="_blank" rel="noopener">${escapeHtml(links.complete_url)}</a></div>
      `;

      qs("#copyProgressBtn").disabled = false;
      qs("#copyCompleteBtn").disabled = false;
      qs("#openProgressBtn").href = links.progress_url;
      qs("#openProgressBtn").style.display = "inline-flex";
    }

    async function findBookingById(pw, bid){
      // Try next30 then latest100
      const r1 = await postJson("/api/admin/bookings", { admin_password: pw, mode: "next30" });
      if (r1.ok && r1.out?.ok) {
        const hit = (r1.out.rows || []).find(x => x.id === bid);
        if (hit) return hit;
      }

      const r2 = await postJson("/api/admin/bookings", { admin_password: pw, mode: "latest100" });
      if (r2.ok && r2.out?.ok) {
        const hit = (r2.out.rows || []).find(x => x.id === bid);
        if (hit) return hit;
      }

      return null;
    }

    async function loadBooking(){
      const pw = getPw();
      const bid = getBid();

      if (!pw) return showStatus("Missing admin password.", "bad");
      if (!bid) return showStatus("Missing booking id.", "bad");

      showStatus("Loading booking…");
      setButtonsEnabled(false);

      const b = await findBookingById(pw, bid);
      if (!b) {
        return showStatus("Booking not found in next30 or latest100 list. Load it from /admin and open Controls from there.", "bad");
      }

      renderBooking(b);

      // If booking already has token and enabled, show links from origin
      // (We still prefer server-provided links after update calls.)
      if (b.progress_enabled === true && b.progress_token) {
        const origin = location.origin;
        renderLinks({
          progress_url: `${origin}/progress?token=${encodeURIComponent(b.progress_token)}`,
          complete_url: `${origin}/complete?token=${encodeURIComponent(b.progress_token)}`,
        });
      } else {
        renderLinks(null);
      }

      showStatus("Loaded.", "ok");
      setTimeout(hideStatus, 1200);
    }

    qs("#loadBtn").addEventListener("click", loadBooking);

    // Save job status
    qs("#saveStatusBtn").addEventListener("click", async () => {
      const pw = getPw(), bid = getBid();
      const job_status = qs("#job_status").value;

      showStatus("Saving status…");
      const r = await postJson("/api/admin/booking_update", {
        admin_password: pw,
        booking_id: bid,
        action: "set_job_status",
        job_status,
      });

      if (!r.ok || !r.out?.ok) return showStatus(r.out?.error ? `Error: ${r.out.error}` : "Update failed.", "bad");

      renderBooking({ ...currentBooking, ...r.out.row });
      renderLinks(r.out.links || null);
      showStatus("Saved.", "ok");
      setTimeout(hideStatus, 1200);
    });

    // Save progress enabled
    qs("#saveProgressBtn").addEventListener("click", async () => {
      const pw = getPw(), bid = getBid();
      const progress_enabled = (qs("#progress_enabled").value === "true");

      showStatus("Saving progress setting…");
      const r = await postJson("/api/admin/booking_update", {
        admin_password: pw,
        booking_id: bid,
        action: "set_progress_enabled",
        progress_enabled,
      });

      if (!r.ok || !r.out?.ok) return showStatus(r.out?.error ? `Error: ${r.out.error}` : "Update failed.", "bad");

      renderBooking({ ...currentBooking, ...r.out.row });
      renderLinks(r.out.links || null);
      showStatus("Saved.", "ok");
      setTimeout(hideStatus, 1200);
    });

    // Regenerate token
    qs("#regenTokenBtn").addEventListener("click", async () => {
      const pw = getPw(), bid = getBid();

      showStatus("Regenerating token…");
      const r = await postJson("/api/admin/booking_update", {
        admin_password: pw,
        booking_id: bid,
        action: "regen_progress_token",
      });

      if (!r.ok || !r.out?.ok) return showStatus(r.out?.error ? `Error: ${r.out.error}` : "Update failed.", "bad");

      renderBooking({ ...currentBooking, ...r.out.row });
      renderLinks(r.out.links || null);
      showStatus("Token regenerated.", "ok");
      setTimeout(hideStatus, 1200);
    });

    // Copy buttons
    async function copyText(t){
      try {
        await navigator.clipboard.writeText(t);
        showStatus("Copied to clipboard.", "ok");
        setTimeout(hideStatus, 900);
      } catch {
        showStatus("Clipboard blocked by browser. Copy manually from the links box.", "bad");
      }
    }

    qs("#copyProgressBtn").addEventListener("click", () => {
      if (!currentLinks?.progress_url) return;
      copyText(currentLinks.progress_url);
    });

    qs("#copyCompleteBtn").addEventListener("click", () => {
      if (!currentLinks?.complete_url) return;
      copyText(currentLinks.complete_url);
    });

    // Auto load if bid present
    (async function autoLoad(){
      const bid = getBid();
      const pw = getPw();
      if (bid && pw) await loadBooking();
    })();
  </script>

  <script type="module" src="/assets/chrome.js?v=20260310b"></script>
</body>
</html>
