<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Admin Catalog | Rosie Dazzlers</title><meta name="robots" content="noindex,nofollow"/><meta name="description" content="Inventory, reorder, and receiving workflow for Rosie Dazzlers." /><link rel="stylesheet" href="/assets/site.css"/><style>.grid2{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.stack{display:grid;gap:12px}.mini{font-size:.92rem;color:rgba(234,242,255,.72)} table{width:100%;border-collapse:collapse} th,td{padding:8px;border-bottom:1px solid rgba(255,255,255,.08);vertical-align:top}@media(max-width:980px){.grid2{grid-template-columns:1fr}}</style></head><body><div class="nav"><div class="nav-inner"><a class="brand" href="/admin"><img data-logo alt="Rosie Dazzlers logo"/><strong>Rosie Dazzlers Admin</strong></a><button class="btn small ghost nav-toggle" id="navToggle" type="button" aria-expanded="false">Menu</button><div class="nav-links" id="navLinks"></div></div></div><main class="container"><section class="panel"><div class="row" style="justify-content:space-between"><div><h1 style="margin:0 0 6px">Catalog Workflow</h1><p class="kicker" style="margin:0">Inventory, low stock, reorder requests, and receive/close actions using the signed-in staff session.</p></div><div id="actorBox" class="notice" style="display:none"></div></div><div id="status" class="notice" style="display:none;margin-top:12px"></div></section><section class="section grid2"><article class="panel stack"><div class="row"><button class="btn ghost" id="reloadBtn" type="button">Reload inventory</button><select id="itemType"><option value="">All types</option><option value="tool">Tools</option><option value="consumable">Consumables</option></select></div><div class="mini" id="invSummary"></div><div style="overflow:auto"><table><thead><tr><th>Item</th><th>Qty</th><th>Reorder</th><th>Action</th></tr></thead><tbody id="invBody"><tr><td colspan="4">Loading…</td></tr></tbody></table></div></article><article class="panel stack"><div class="row"><button class="btn ghost" id="reloadOrdersBtn" type="button">Reload orders</button><select id="orderStatus"><option value="">All orders</option><option value="requested">Requested</option><option value="ordered">Ordered</option><option value="received">Received</option><option value="cancelled">Cancelled</option></select></div><div class="mini" id="orderSummary"></div><div style="overflow:auto"><table><thead><tr><th>Order</th><th>Status</th><th>Reminder</th><th>Actions</th></tr></thead><tbody id="orderBody"><tr><td colspan="4">Loading…</td></tr></tbody></table></div></article></section></main><footer class="footer container" data-footer></footer><script src="/assets/admin-auth.js"></script><script src="/assets/admin-shell.js"></script><script> (function(){ const qs=(s)=>document.querySelector(s); let actor=null; function show(msg,kind=''){const el=qs('#status'); el.style.display='block'; el.className='notice '+(kind||''); el.textContent=msg;} function hide(){qs('#status').style.display='none';} function hdrs(){ return {'Content-Type':'application/json', ...(actor?.email ? {'x-staff-email': actor.email} : {})}; } async function getJson(url){ const r=await fetch(url,{credentials:'include',headers:hdrs()}); return {ok:r.ok,status:r.status,out:await r.json().catch(()=>null)}; } async function postJson(url,payload){ const r=await fetch(url,{method:'POST',credentials:'include',headers:hdrs(),body:JSON.stringify(payload)}); return {ok:r.ok,status:r.status,out:await r.json().catch(()=>null)}; }
async function loadInventory(){ hide(); const type=qs('#itemType').value; const url='/api/admin/catalog_inventory_list'+(type?`?item_type=${encodeURIComponent(type)}`:''); const r=await getJson(url); if(!r.ok||!r.out?.ok){ qs('#invBody').innerHTML=`<tr><td colspan="4">${(r.out&&r.out.error)||'Could not load inventory.'}</td></tr>`; return; } const items=Array.isArray(r.out.items)?r.out.items:[]; const low=Array.isArray(r.out.low_stock)?r.out.low_stock:[]; qs('#invSummary').textContent=`${items.length} items loaded · ${low.length} low-stock`; qs('#invBody').innerHTML=items.map((item)=>`<tr><td><strong>${esc(item.name)}</strong><div class="mini">${esc(item.item_key)} · ${esc(item.item_type || '')}</div></td><td>${esc(item.qty_on_hand)} ${esc(item.unit_label || '')}</td><td>${esc(item.reorder_point)} / qty ${esc(item.reorder_qty)}</td><td>${Number(item.qty_on_hand||0) <= Number(item.reorder_point||0) ? `<button class="btn ghost" data-reorder="${esc(item.item_key)}">Create reorder</button>` : `<span class="mini">OK</span>`}</td></tr>`).join('') || '<tr><td colspan="4">No inventory items found.</td></tr>'; document.querySelectorAll('[data-reorder]').forEach((btn)=>btn.addEventListener('click', async()=>{ const reminderAt=new Date(Date.now()+3*24*60*60*1000).toISOString(); const x=await postJson('/api/admin/catalog_reorder_request',{ item_key: btn.dataset.reorder, status:'requested', reminder_at: reminderAt }); if(!x.ok||!x.out?.ok) return show((x.out&&x.out.error)||'Could not create reorder.','bad'); show('Reorder request created.','ok'); loadInventory(); loadOrders(); })); }
async function loadOrders(){ const status=qs('#orderStatus').value; const url='/api/admin/catalog_purchase_orders_list'+(status?`?status=${encodeURIComponent(status)}`:''); const r=await getJson(url); if(!r.ok||!r.out?.ok){ qs('#orderBody').innerHTML=`<tr><td colspan="4">${(r.out&&r.out.error)||'Could not load orders.'}</td></tr>`; return; } const orders=Array.isArray(r.out.orders)?r.out.orders:[]; const due=Array.isArray(r.out.reminder_due)?r.out.reminder_due:[]; qs('#orderSummary').textContent=`${orders.length} orders · ${due.length} reminders due`; qs('#orderBody').innerHTML=orders.map((po)=>`<tr><td><strong>${esc(po.item_name || po.item_key || 'Order')}</strong><div class="mini">${esc(po.vendor_name || '')} · qty ${esc(po.qty_ordered)}</div></td><td>${esc(po.status)}</td><td>${po.reminder_at ? esc(new Date(po.reminder_at).toLocaleString()) : '<span class="mini">None</span>'}</td><td><div class="row">${['requested','ordered'].includes(po.status) ? `<button class="btn ghost" data-status="ordered" data-id="${po.id}">Mark ordered</button>` : ''}${['requested','ordered'].includes(po.status) ? `<button class="btn ghost" data-status="received" data-id="${po.id}">Mark received</button>` : ''}${po.status !== 'cancelled' && po.status !== 'received' ? `<button class="btn ghost" data-status="cancelled" data-id="${po.id}">Cancel</button>` : ''}</div></td></tr>`).join('') || '<tr><td colspan="4">No purchase orders found.</td></tr>'; document.querySelectorAll('[data-status]').forEach((btn)=>btn.addEventListener('click', async()=>{ const x=await postJson('/api/admin/catalog_purchase_order_update',{ id: btn.dataset.id, status: btn.dataset.status, note: `Updated from admin catalog by ${actor?.full_name || 'staff'}` }); if(!x.ok||!x.out?.ok) return show((x.out&&x.out.error)||'Could not update order.','bad'); show(`Order moved to ${btn.dataset.status}.`,'ok'); loadOrders(); })); }
function esc(v){ return String(v==null?'':v).replace(/[&<>"']/g,(m)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
qs('#reloadBtn').addEventListener('click', loadInventory); qs('#reloadOrdersBtn').addEventListener('click', loadOrders); qs('#itemType').addEventListener('change', loadInventory); qs('#orderStatus').addEventListener('change', loadOrders); window.AdminShell.boot({ pageKey:'catalog', onReady: async ({actor:current}) => { actor=current||null; const box=qs('#actorBox'); if(actor){ box.style.display='block'; box.textContent=`Signed in as ${actor.full_name || actor.email || 'staff'} (${actor.role_code || 'staff'})`; } loadInventory(); loadOrders(); } }); })(); </script><script src="/assets/chrome.js"></script></body></html>
