<!-- /gear.html
     REPLACE ENTIRE FILE

     Fix:
     - If amazon_url is missing in systems_catalog.json,
       generate an Amazon search link automatically from the item name.

     Data file:
       /data/systems_catalog.json
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Detailing Gear | Rosie Dazzlers</title>
  <meta name="description" content="The tools, machines, and gear we use for mobile auto detailing." />
  <link rel="stylesheet" href="/assets/site.css?v=20260311h" />
  <style>
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    @media (max-width:1100px){ .grid3{grid-template-columns:repeat(2,1fr)} }
    @media (max-width:980px){ .grid3{grid-template-columns:1fr} }
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .muted{color:rgba(234,242,255,.62)}
    .cardImg{
      width:100%;
      aspect-ratio:16/10;
      object-fit:cover;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
    }
    .mini{font-size:.92rem}
    .tag{display:inline-flex;align-items:center;gap:6px;padding:2px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);font-size:.9rem}
  </style>
</head>

<body>
  <div class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <img data-logo alt="Rosie Dazzlers logo" />
        <strong>Rosie Dazzlers</strong>
      </a>
      <button class="btn small ghost nav-toggle" id="navToggle" type="button" aria-expanded="false">Menu</button>
      <div class="nav-links" id="navLinks"></div>
      <a class="btn primary" href="/book">Book now</a>
    </div>
  </div>

  <div class="container">
    <div class="panel">
      <h1 style="margin:0 0 6px">Gear</h1>
      <p class="kicker" style="margin:0">The equipment we use to do the job right.</p>

      <div class="hr"></div>

      <div class="row">
        <label style="flex:1;min-width:260px">
          <span class="muted mini">Search</span>
          <input id="q" type="text" placeholder="Search gear…" />
        </label>
        <button class="btn ghost" id="clearBtn" type="button">Clear</button>
      </div>

      <div id="loadErr" class="notice bad" style="display:none;margin-top:12px"></div>
      <div class="muted mini" id="count" style="margin-top:10px"></div>
    </div>

    <div class="section">
      <div class="grid3" id="grid"></div>
    </div>

    <div class="footer" data-footer></div>
  </div>

  <script type="module">
    const PUBLIC_CATALOG_URL = "/api/catalog_public?catalog_type=systems";
    const DATA_URL = "/data/systems_catalog.json?v=20260311h";
    const AMAZON_CA_SEARCH = "https://www.amazon.ca/s?k=";

    const qs = (s)=>document.querySelector(s);

    function escapeHtml(s){
      return String(s||"")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#39;");
    }

    async function fetchJsonStrict(url){
      const res = await fetch(url,{cache:"no-store"});
      const text = await res.text();
      try { return JSON.parse(text); }
      catch {
        const head = text.slice(0,120).replace(/\s+/g," ");
        throw new Error(`Expected JSON from ${url} but got: ${head}`);
      }
    }

    function renderStars(value){ const rounded = Math.round(Number(value||0)); return rounded ? "★".repeat(rounded) + "☆".repeat(5-rounded) : ""; }

    function normalizeItem(x){
      const name = x.name || x.title || x.item || x.filename || "Item";
      const notes = x.notes || x.description || x.caption || "";
      const image_url = x.image_url || x.image || x.r2_url || x.url || null;

      const given = x.amazon_url || x.amazon || x.link || null;
      const amazon_url = given && String(given).trim()
        ? String(given).trim()
        : (AMAZON_CA_SEARCH + encodeURIComponent(name));

      const amazon_is_generated = !(given && String(given).trim());

      return { name, notes, image_url, amazon_url, amazon_is_generated, rating: x.overall_rating ?? null, brand: x.brand || null, model: x.model || null, location_label: x.location_label || null };
    }

    function matches(item, q){
      if (!q) return true;
      const hay = `${item.name} ${item.notes}`.toLowerCase();
      return hay.includes(q.toLowerCase());
    }

    function render(list){
      const grid = qs("#grid");
      grid.innerHTML = "";

      const q = (qs("#q").value || "").trim();
      const filtered = list.filter(it => matches(it, q));

      qs("#count").textContent = `${filtered.length} items`;

      for (const it of filtered){
        const card = document.createElement("div");
        card.className = "panel";

        const img = it.image_url
          ? `<img class="cardImg" alt="${escapeHtml(it.name)}" src="${escapeHtml(it.image_url)}" loading="lazy" decoding="async" />`
          : "";

        const badge = it.amazon_is_generated
          ? `<span class="tag">Amazon search</span>`
          : `<span class="tag">Amazon link</span>`;

        card.innerHTML = `
          ${img}
          <div style="margin-top:${img ? "10px":"0"}">
            <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap">
              <h3 style="margin:0">${escapeHtml(it.name)}</h3>
              ${badge}
            </div>

            ${it.notes ? `<div class="muted mini" style="margin-top:6px">${escapeHtml(it.notes)}</div>` : ``}
            ${(it.brand || it.model || it.location_label) ? `<div class="muted mini" style="margin-top:6px">${escapeHtml([it.brand,it.model].filter(Boolean).join(" "))}${it.location_label ? ` • ${escapeHtml(it.location_label)}` : ``}</div>` : ``}
            ${it.rating ? `<div class="muted mini" style="margin-top:6px">Equipment rating: ${escapeHtml(renderStars(it.rating))} (${escapeHtml(String(it.rating))}/5)</div>` : ``}

            <div class="row" style="margin-top:12px">
              <a class="btn primary" target="_blank" rel="noopener" href="${escapeHtml(it.amazon_url)}">View on Amazon</a>
            </div>
          </div>
        `;

        const imgEl = card.querySelector("img");
        if (imgEl) imgEl.onerror = ()=>{ imgEl.style.display = "none"; };

        grid.appendChild(card);
      }
    }

    try {
      let raw = null;
      try { raw = await fetchJsonStrict(PUBLIC_CATALOG_URL); } catch {}
      if (!raw || raw.ok === false) raw = await fetchJsonStrict(DATA_URL);
      const arr = Array.isArray(raw) ? raw : (Array.isArray(raw.items) ? raw.items : []);
      const list = arr.map(normalizeItem);

      render(list);

      qs("#q").addEventListener("input", ()=>render(list));
      qs("#clearBtn").addEventListener("click", ()=>{
        qs("#q").value = "";
        render(list);
      });

    } catch (e) {
      qs("#loadErr").style.display = "block";
      qs("#loadErr").textContent = `Failed to load gear JSON: ${e.message || e}`;
    }
  </script>

  <script type="module" src="/assets/chrome.js?v=20260311h"></script>
</body>
</html>
