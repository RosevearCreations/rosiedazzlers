<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rosie Dazzlers — Jobsite Workspace</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="/assets/site.css" />
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 35%),
        linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: #f8fafc;
    }

    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    .loading {
      display: grid;
      place-items: center;
      min-height: 60vh;
      color: #cbd5e1;
      font-size: 1rem;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .brandblock h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
      line-height: 1.15;
    }

    .brandblock p {
      margin: 0;
      color: #cbd5e1;
      max-width: 720px;
      line-height: 1.5;
    }

    .actorcard {
      min-width: 280px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px 18px;
      box-shadow: 0 14px 35px rgba(0,0,0,0.22);
    }

    .actorline {
      margin: 4px 0;
      color: #e5e7eb;
      font-size: 0.96rem;
    }

    .actorlabel {
      color: #93c5fd;
      font-weight: 700;
      margin-right: 6px;
    }

    .logout-btn {
      margin-top: 10px;
      appearance: none;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .status {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(220,38,38,0.12);
      border: 1px solid rgba(248,113,113,0.25);
      color: #fecaca;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.4fr 1fr auto;
      gap: 12px;
      margin-bottom: 18px;
    }

    .input,
    .select,
    .button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #f8fafc;
      padding: 12px 14px;
      font-size: 0.98rem;
    }

    .button {
      background: #2563eb;
      font-weight: 700;
      cursor: pointer;
      border: 0;
      width: auto;
      min-width: 140px;
    }

    .button.secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .card {
      grid-column: span 12;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 14px 35px rgba(0,0,0,0.22);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1.1rem;
    }

    .card p {
      margin: 0 0 12px;
      color: #cbd5e1;
      line-height: 1.45;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .meta-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 12px;
    }

    .meta-label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #93c5fd;
      margin-bottom: 6px;
    }

    .meta-value {
      color: #f8fafc;
      word-break: break-word;
    }

    .stack {
      display: grid;
      gap: 12px;
    }
