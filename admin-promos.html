<!-- /admin-promos.html
     REPLACE ENTIRE FILE

     Purpose:
     - Simple admin UI to create and manage promo codes (percent or fixed amount)
     - This is the "framework" UI — the API + DB table comes next.

     Uses (expected next endpoints we will create):
       POST /api/admin/promo_create
       POST /api/admin/promo_list
       POST /api/admin/promo_disable

     Notes:
     - Promo codes are separate from Gift Certificates.
     - Promo codes can be:
         - percent_off (e.g. 10%)
         - amount_off_cents (e.g. $25.00)
     - We will apply them in /api/checkout after this.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Promos | Rosie Dazzlers</title>
  <meta name="description" content="Create discount promo codes." />
  <link rel="stylesheet" href="/assets/site.css?v=20260311t" />
  <style>
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width:980px){ .grid2{grid-template-columns:1fr} }
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .muted{color:rgba(234,242,255,.62)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.10);vertical-align:top}
    th{color:rgba(234,242,255,.70);font-weight:600;text-align:left}
    .mini{font-size:.92rem}
    pre{white-space:pre-wrap;word-break:break-word;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:10px}
    .tag{display:inline-flex;align-items:center;gap:6px;padding:2px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);font-size:.9rem}
    .tag.ok{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.10)}
    .tag.warn{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.10)}
    .tag.bad{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.10)}
  </style>
</head>

<body>
  <div class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <img data-logo alt="Rosie Dazzlers logo" />
        <strong>Rosie Dazzlers</strong>
      </a>
      <button class="btn small ghost nav-toggle" id="navToggle" type="button" aria-expanded="false">Menu</button>
      <div class="nav-links" id="navLinks"></div>
      <a class="btn primary" href="/admin">Admin</a>
    </div>
  </div>

  <div class="container">
    <div class="panel">
      <h1 style="margin:0 0 6px">Promo Codes</h1>
      <p class="kicker" style="margin:0">Create discount codes (percent or dollar amount).</p>

      <div class="hr"></div>

      <div class="row">
        <label style="display:flex;flex-direction:column;gap:6px;min-width:260px">
          <span class="muted">Admin password</span>
          <input id="pw" type="password" placeholder="Enter admin password…" />
        </label>

        <div class="row" style="align-items:flex-end">
          <button class="btn ghost" id="savePwBtn" type="button">Save password</button>
          <button class="btn ghost" id="refreshBtn" type="button">Refresh</button>
          <a class="btn ghost" href="/admin">Back</a>
        </div>
      </div>

      <div id="status" class="notice" style="display:none;margin-top:12px"></div>
    </div>

    <div class="section grid2">
      <div class="panel">
        <h2 style="margin-top:0">Create promo</h2>

        <label class="muted mini">Code</label>
        <input id="code" class="mono" type="text" placeholder="SPRING10" />

        <div class="grid2" style="margin-top:10px">
          <div>
            <label for="kind">Type</label>
            <select id="kind">
              <option value="percent">Percent off</option>
              <option value="amount">Amount off (CAD)</option>
            </select>
          </div>
          <div>
            <label for="value">Value</label>
            <input id="value" type="number" min="0" step="0.01" placeholder="10" />
          </div>
        </div>

        <div class="grid2" style="margin-top:10px">
          <div>
            <label for="starts">Starts (optional)</label>
            <input id="starts" type="date" />
          </div>
          <div>
            <label for="ends">Ends (optional)</label>
            <input id="ends" type="date" />
          </div>
        </div>

        <label style="display:flex;gap:10px;align-items:flex-start;margin-top:10px">
          <input id="active" type="checkbox" checked />
          <span>Active</span>
        </label>

        <label for="note" style="margin-top:10px">Internal note (optional)</label>
        <textarea id="note" placeholder="What this promo is for…"></textarea>

        <div class="row" style="margin-top:12px">
          <button class="btn primary" id="createBtn" type="button">Create</button>
          <button class="btn ghost" id="clearBtn" type="button">Clear</button>
        </div>

        <div class="muted mini" style="margin-top:10px">
          Next step: apply promo codes automatically at checkout.
        </div>
      </div>

      <div class="panel">
        <h2 style="margin-top:0">Existing promos</h2>
        <div class="muted mini" id="count"></div>
        <div class="hr"></div>

        <div style="overflow:auto">
          <table>
            <thead>
              <tr>
                <th>Code</th>
                <th>Discount</th>
                <th>Window</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="rows">
              <tr><td colspan="5" class="muted">No data yet.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="hr"></div>
        <pre id="raw" class="mono">{}</pre>
      </div>
    </div>

    <div class="footer" data-footer></div>
  </div>

  <script type="module">
    const qs = (s)=>document.querySelector(s);

    function show(msg, kind=""){
      const el = qs("#status");
      el.style.display = "block";
      el.className = "notice " + (kind || "");
      el.textContent = msg;
    }
    function hide(){ qs("#status").style.display = "none"; }

    function getPw(){ return (qs("#pw").value || "").trim(); }

    async function postJson(url, payload){
      const res = await fetch(url, {
        method: "POST",
        headers: { "content-type":"application/json" },
        body: JSON.stringify(payload),
      });
      const out = await res.json().catch(()=>null);
      return { ok: res.ok, status: res.status, out };
    }

    function esc(s){
      return String(s||"")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#39;");
    }

    // Save PW
    try {
      const saved = localStorage.getItem("rosie_admin_pw") || "";
      if (saved) qs("#pw").value = saved;
    } catch {}

    qs("#savePwBtn").addEventListener("click", () => {
      const pw = getPw();
      if (!pw) return show("Enter password first.", "bad");
      try {
        localStorage.setItem("rosie_admin_pw", pw);
        show("Saved password on this device.", "ok");
        setTimeout(hide, 1000);
      } catch {
        show("Could not save password.", "bad");
      }
    });

    qs("#clearBtn").addEventListener("click", ()=>{
      qs("#code").value = "";
      qs("#kind").value = "percent";
      qs("#value").value = "";
      qs("#starts").value = "";
      qs("#ends").value = "";
      qs("#active").checked = true;
      qs("#note").value = "";
    });

    function discountLabel(p){
      if (p.percent_off != null) return `${p.percent_off}% off`;
      if (p.amount_off_cents != null) return `$${(p.amount_off_cents/100).toFixed(2)} off`;
      return "—";
    }

    function statusTag(p){
      if (!p.is_active) return `<span class="tag bad">disabled</span>`;
      const today = new Date().toISOString().slice(0,10);
      if (p.starts_on && today < p.starts_on) return `<span class="tag warn">scheduled</span>`;
      if (p.ends_on && today > p.ends_on) return `<span class="tag warn">expired</span>`;
      return `<span class="tag ok">active</span>`;
    }

    async function refresh(){
      hide();
      const pw = getPw();
      if (!pw) return show("Missing admin password.", "bad");

      const r = await postJson("/api/admin/promo_list", { admin_password: pw });
      qs("#raw").textContent = JSON.stringify(r.out || {}, null, 2);

      if (!r.ok || !r.out?.ok){
        return show(r.out?.error ? `Error: ${r.out.error}` : `Error (HTTP ${r.status})`, "bad");
      }

      const rows = Array.isArray(r.out.rows) ? r.out.rows : [];
      qs("#count").textContent = `${rows.length} promo codes`;

      const tb = qs("#rows");
      tb.innerHTML = "";

      if (!rows.length){
        tb.innerHTML = `<tr><td colspan="5" class="muted">No promo codes yet.</td></tr>`;
        return;
      }

      for (const p of rows){
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="mono"><strong>${esc(p.code)}</strong></td>
          <td>${esc(discountLabel(p))}</td>
          <td class="muted mini">${esc(p.starts_on || "")}${p.ends_on ? " → " + esc(p.ends_on) : ""}</td>
          <td>${statusTag(p)}</td>
          <td>
            <button class="btn ghost" data-disable="${esc(p.id)}">${p.is_active ? "Disable" : "Enable"}</button>
          </td>
        `;
        tb.appendChild(tr);
      }

      tb.querySelectorAll("button[data-disable]").forEach(btn=>{
        btn.addEventListener("click", async ()=>{
          const pw2 = getPw();
          const id = btn.getAttribute("data-disable");
          if (!pw2) return show("Missing admin password.", "bad");

          btn.disabled = true;
          const r2 = await postJson("/api/admin/promo_disable", { admin_password: pw2, promo_id: id });
          btn.disabled = false;

          qs("#raw").textContent = JSON.stringify(r2.out || {}, null, 2);

          if (!r2.ok || !r2.out?.ok){
            return show(r2.out?.error ? `Error: ${r2.out.error}` : `Error (HTTP ${r2.status})`, "bad");
          }

          show("Updated.", "ok");
          setTimeout(hide, 800);
          await refresh();
        });
      });
    }

    qs("#refreshBtn").addEventListener("click", refresh);

    qs("#createBtn").addEventListener("click", async ()=>{
      hide();
      const pw = getPw();
      if (!pw) return show("Missing admin password.", "bad");

      const code = (qs("#code").value || "").trim().toUpperCase();
      if (!code) return show("Missing promo code.", "bad");

      const kind = qs("#kind").value;
      const value = Number(qs("#value").value);
      if (!Number.isFinite(value) || value <= 0) return show("Enter a valid value > 0.", "bad");

      const payload = {
        admin_password: pw,
        code,
        is_active: !!qs("#active").checked,
        starts_at: qs("#starts").value ? new Date(`${qs("#starts").value}T00:00:00`).toISOString() : null,
        ends_at: qs("#ends").value ? new Date(`${qs("#ends").value}T23:59:59`).toISOString() : null,
        notes: (qs("#note").value || "").trim() || null,
        discount_type: kind === "percent" ? "percent" : "fixed",
        discount_value: kind === "percent" ? Math.round(value * 100) / 100 : Math.round(value * 100) / 100,
      };

      qs("#createBtn").disabled = true;
      qs("#createBtn").textContent = "Creating…";

      const r = await postJson("/api/admin/promos_save", payload);

      qs("#createBtn").disabled = false;
      qs("#createBtn").textContent = "Create";

      qs("#raw").textContent = JSON.stringify(r.out || {}, null, 2);

      if (!r.ok || !r.out?.ok){
        return show(r.out?.error ? `Error: ${r.out.error}` : `Error (HTTP ${r.status})`, "bad");
      }

      show("Created.", "ok");
      setTimeout(hide, 800);
      await refresh();
    });
  </script>

  <script type="module" src="/assets/chrome.js?v=20260311t"></script>
</body>
</html>
