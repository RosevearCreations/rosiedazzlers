<!-- /admin-assign.html
     REPLACE ENTIRE FILE

     Assign staff + internal notes to a booking.
     Uses:
       - /api/admin/assign (backend already created)
       - /api/admin/bookings (to fetch booking info by id)
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Assign Staff | Rosie Dazzlers</title>
  <meta name="description" content="Assign staff to a booking." />
  <link rel="stylesheet" href="/assets/site.css?v=20260310e" />
  <style>
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width:980px){ .grid2{grid-template-columns:1fr} }
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
    .muted{color:rgba(234,242,255,.62)}
    textarea{min-height:140px}
    pre{white-space:pre-wrap;word-break:break-word;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:10px}
  </style>
</head>

<body>
  <div class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <img data-logo alt="Rosie Dazzlers logo" />
        <strong>Rosie Dazzlers</strong>
      </a>
      <button class="btn small ghost nav-toggle" id="navToggle" type="button" aria-expanded="false">Menu</button>
      <div class="nav-links" id="navLinks"></div>
      <a class="btn primary" href="/admin">Admin</a>
    </div>
  </div>

  <div class="container">
    <div class="panel">
      <h1 style="margin:0 0 6px">Assign Staff</h1>
      <p class="kicker" style="margin:0">Set who is assigned to a booking and add internal notes.</p>

      <div class="hr"></div>

      <div class="row">
        <label style="display:flex;flex-direction:column;gap:6px;min-width:260px">
          <span class="muted">Admin password</span>
          <input id="pw" type="password" placeholder="Enter admin password…" />
        </label>

        <label style="display:flex;flex-direction:column;gap:6px;min-width:420px;flex:1">
          <span class="muted">Booking ID (uuid)</span>
          <input id="bid" class="mono" type="text" placeholder="d751e9f0-717d-4ab6-a2be-dba309006b76" />
        </label>

        <div class="row" style="align-items:flex-end">
          <button class="btn primary" id="loadBtn" type="button">Load booking</button>
          <button class="btn ghost" id="savePwBtn" type="button">Save password</button>
          <a class="btn ghost" href="/admin">Back to Admin</a>
        </div>
      </div>

      <div id="status" class="notice" style="display:none;margin-top:12px"></div>
    </div>

    <div class="section grid2">
      <div class="panel">
        <h2 style="margin-top:0">Booking</h2>
        <div id="details" class="notice warn">Load a booking to begin.</div>

        <div class="row" style="margin-top:12px">
          <a id="controlsBtn" class="btn ghost" href="/admin-booking.html">Controls</a>
          <a id="uploadBtn" class="btn ghost" href="/admin-upload.html">Upload</a>
          <a id="progressBtn" class="btn ghost" href="/admin-progress.html">Progress</a>
        </div>
      </div>

      <div class="panel">
        <h2 style="margin-top:0">Assign</h2>

        <div class="grid2">
          <div>
            <label for="assigned_staff_name">Staff name</label>
            <input id="assigned_staff_name" type="text" placeholder="Jack / Laurie / Helper name" />
          </div>
          <div>
            <label for="assigned_staff_email">Staff email (optional)</label>
            <input id="assigned_staff_email" type="email" placeholder="staff@example.com" />
          </div>
        </div>

        <label for="internal_notes" style="margin-top:10px">Internal notes</label>
        <textarea id="internal_notes" placeholder="Notes only staff should see…"></textarea>

        <div class="row" style="margin-top:12px">
          <button class="btn primary" id="saveBtn" type="button" disabled>Save assignment</button>
          <button class="btn ghost" id="clearBtn" type="button" disabled>Clear</button>
        </div>

        <div class="muted" style="margin-top:10px">
          Internal notes are not shown to customers.
        </div>
      </div>
    </div>

    <div class="section">
      <div class="panel">
        <h2 style="margin-top:0">Last response</h2>
        <pre id="raw" class="mono">{}</pre>
      </div>
    </div>

    <div class="footer" data-footer></div>
  </div>

  <script type="module">
    const qs = (s)=>document.querySelector(s);

    function escapeHtml(s){
      return String(s || "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function showStatus(msg, kind=""){
      const el = qs("#status");
      el.style.display = "block";
      el.className = "notice " + (kind || "");
      el.textContent = msg;
    }
    function hideStatus(){ qs("#status").style.display = "none"; }

    function getPw(){ return (qs("#pw").value || "").trim(); }
    function getBid(){ return (qs("#bid").value || "").trim(); }

    async function postJson(url, payload){
      const res = await fetch(url, {
        method: "POST",
        headers: { "content-type":"application/json" },
        body: JSON.stringify(payload),
      });
      const out = await res.json().catch(()=>null);
      return { ok: res.ok, status: res.status, out };
    }

    // save PW
    try {
      const saved = localStorage.getItem("rosie_admin_pw") || "";
      if (saved) qs("#pw").value = saved;
    } catch {}

    qs("#savePwBtn").addEventListener("click", () => {
      const pw = getPw();
      if (!pw) return showStatus("Enter password first.", "bad");
      try {
        localStorage.setItem("rosie_admin_pw", pw);
        showStatus("Saved password on this device.", "ok");
        setTimeout(hideStatus, 1200);
      } catch {
        showStatus("Could not save password.", "bad");
      }
    });

    // prefill bid
    (function prefill(){
      const p = new URLSearchParams(location.search);
      const bid = (p.get("bid") || "").trim();
      if (bid) qs("#bid").value = bid;
      syncLinks();
    })();

    function syncLinks(){
      const bid = getBid();
      qs("#controlsBtn").href = bid ? `/admin-booking.html?bid=${encodeURIComponent(bid)}` : "/admin-booking.html";
      qs("#uploadBtn").href = bid ? `/admin-upload.html?bid=${encodeURIComponent(bid)}` : "/admin-upload.html";
      qs("#progressBtn").href = bid ? `/admin-progress.html?bid=${encodeURIComponent(bid)}` : "/admin-progress.html";
    }
    qs("#bid").addEventListener("input", syncLinks);

    function enable(on){
      qs("#saveBtn").disabled = !on;
      qs("#clearBtn").disabled = !on;
    }

    function prettyPkg(code){
      const map = {
        premium_wash: "Premium Wash",
        basic_detail: "Basic Detail",
        complete_detail: "Complete Detail",
        interior_detail: "Interior Detail",
        exterior_detail: "Exterior Detail",
      };
      return map[code] || code || "";
    }

    function fmtMoneyCents(cents){
      if (cents == null) return "—";
      return new Intl.NumberFormat("en-CA", { style:"currency", currency:"CAD" }).format(Number(cents)/100);
    }

    async function findBookingById(pw, bid){
      const r1 = await postJson("/api/admin/bookings", { admin_password: pw, mode: "next30" });
      if (r1.ok && r1.out?.ok) {
        const hit = (r1.out.rows || []).find(x => x.id === bid);
        if (hit) return hit;
      }
      const r2 = await postJson("/api/admin/bookings", { admin_password: pw, mode: "latest100" });
      if (r2.ok && r2.out?.ok) {
        const hit = (r2.out.rows || []).find(x => x.id === bid);
        if (hit) return hit;
      }
      return null;
    }

    let booking = null;

    function renderBooking(b){
      booking = b;
      enable(true);

      const vehicle = b.vehicle || null;
      const vehicleLine = vehicle
        ? `${vehicle.year || ""} ${vehicle.make || ""} ${vehicle.model || ""}`.trim()
        : "";

      qs("#details").className = "notice";
      qs("#details").innerHTML = `
        <div><strong>${escapeHtml(b.customer_name || "")}</strong> — ${escapeHtml(b.customer_email || "")}</div>
        <div class="muted">${escapeHtml(prettyPkg(b.package_code))} (${escapeHtml(b.vehicle_size || "")})</div>
        ${vehicleLine ? `<div class="muted">Vehicle: ${escapeHtml(vehicleLine)}</div>` : ``}
        <div class="muted">Date: ${escapeHtml(b.service_date || "")} • Slot: ${escapeHtml(b.start_slot || "")}</div>
        <div class="muted">Total: <strong>${fmtMoneyCents(b.price_total_cents)}</strong> • Deposit: <strong>${fmtMoneyCents(b.deposit_cents)}</strong></div>
        <div class="muted">Assigned: <strong>${escapeHtml(b.assigned_staff_name || "—")}</strong></div>
      `;

      qs("#assigned_staff_name").value = b.assigned_staff_name || "";
      qs("#assigned_staff_email").value = b.assigned_staff_email || "";
      qs("#internal_notes").value = b.internal_notes || "";

      syncLinks();
    }

    qs("#loadBtn").addEventListener("click", async () => {
      const pw = getPw();
      const bid = getBid();
      if (!pw) return showStatus("Missing admin password.", "bad");
      if (!bid) return showStatus("Missing booking id.", "bad");

      showStatus("Loading booking…");
      enable(false);

      const b = await findBookingById(pw, bid);
      if (!b) return showStatus("Booking not found. Open from /admin → Assign for that row.", "bad");

      renderBooking(b);
      showStatus("Loaded.", "ok");
      setTimeout(hideStatus, 1200);
    });

    qs("#clearBtn").addEventListener("click", () => {
      qs("#assigned_staff_name").value = "";
      qs("#assigned_staff_email").value = "";
      qs("#internal_notes").value = "";
      qs("#raw").textContent = "{}";
    });

    qs("#saveBtn").addEventListener("click", async () => {
      const pw = getPw();
      const bid = getBid();
      if (!pw) return showStatus("Missing admin password.", "bad");
      if (!bid) return showStatus("Missing booking id.", "bad");

      const payload = {
        admin_password: pw,
        booking_id: bid,
        assigned_staff_name: (qs("#assigned_staff_name").value || "").trim() || null,
        assigned_staff_email: (qs("#assigned_staff_email").value || "").trim() || null,
        internal_notes: (qs("#internal_notes").value || "").trim() || null,
      };

      showStatus("Saving…");
      const r = await postJson("/api/admin/assign", payload);
      qs("#raw").textContent = JSON.stringify(r.out || {}, null, 2);

      if (!r.ok || !r.out?.ok) {
        return showStatus(r.out?.error ? `Error: ${r.out.error}` : "Save failed.", "bad");
      }

      // patch the local booking so the page reflects changes
      booking = { ...booking, ...r.out.row };
      renderBooking(booking);

      showStatus("Saved.", "ok");
      setTimeout(hideStatus, 1200);
    });

    // auto-load if bid + pw present
    (async function auto(){
      const bid = getBid();
      const pw = getPw();
      if (bid && pw) qs("#loadBtn").click();
    })();
  </script>

  <script type="module" src="/assets/chrome.js?v=20260310e"></script>
</body>
</html>
