<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Assign | Rosie Dazzlers</title>
  <meta name="description" content="Assign staff to bookings from a signed-in admin session." />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="/assets/site.css?v=20260403a" />
  <style>
    .grid2{display:grid;grid-template-columns:1fr;gap:12px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .muted{color:rgba(234,242,255,.62)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.10);vertical-align:top}
    th{color:rgba(234,242,255,.70);font-weight:600;text-align:left}
    .mini{font-size:.92rem}
    pre{white-space:pre-wrap;word-break:break-word;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:10px}
    input.small{padding:10px 10px}
  </style>
</head>
<body>
  <div class="nav">
    <div class="nav-inner">
      <a class="brand" href="/admin">
        <img data-logo alt="Rosie Dazzlers logo" />
        <strong>Rosie Dazzlers Admin</strong>
      </a>
      <button class="btn small ghost nav-toggle" id="navToggle" type="button" aria-expanded="false">Menu</button>
      <div class="nav-links" id="navLinks"></div>
    </div>
  </div>

  <div class="container">
    <div class="panel">
      <div class="row" style="justify-content:space-between;align-items:flex-start">
        <div>
          <h1 style="margin:0 0 6px">Assign staff</h1>
          <p class="kicker" style="margin:0">Use the signed-in staff session to assign bookings and keep assignment history cleaner.</p>
        </div>
        <div id="actorBox" class="notice">Checking signed-in staff session…</div>
      </div>

      <div class="hr"></div>

      <div class="row">
        <button class="btn primary" id="loadBtn" type="button">Load bookings</button>
        <a class="btn ghost" href="/admin-booking.html">Open booking manager</a>
        <a class="btn ghost" href="/admin">Back</a>
      </div>

      <div id="status" class="notice" style="display:none;margin-top:12px"></div>
    </div>

    <div class="section">
      <div class="panel">
        <div class="row" style="justify-content:space-between;align-items:flex-end">
          <div>
            <h2 style="margin-top:0">Upcoming bookings</h2>
            <div class="muted mini" id="count">Load bookings to begin.</div>
          </div>
          <div class="row">
            <input id="searchQ" class="search-input" type="text" placeholder="Search customer, email, package" autocomplete="off" />
          </div>
        </div>
        <div class="hr"></div>

        <div style="overflow:auto">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Slot</th>
                <th>Customer</th>
                <th>Package</th>
                <th>Assigned to</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="rows">
              <tr><td colspan="6" class="muted">Load bookings…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="panel">
        <h2 style="margin-top:0">Raw</h2>
        <pre id="raw" class="mono">{}</pre>
      </div>
    </div>

    <div class="footer" data-footer></div>
  </div>

  <script src="/assets/admin-auth.js"></script>
  <script src="/assets/admin-shell.js"></script>
  <script>
    (function(){
      const qs = (s)=>document.querySelector(s);
      let bookings = [];
      function show(msg, kind=""){
        const el = qs("#status");
        el.style.display = "block";
        el.className = "notice " + (kind || "");
        el.textContent = msg;
      }
      function hide(){ qs("#status").style.display = "none"; }
      async function postJson(url, payload){
        const res = await fetch(url, {
          method: "POST",
          credentials: "include",
          headers: { "content-type":"application/json" },
          body: JSON.stringify(payload || {}),
        });
        const out = await res.json().catch(()=>null);
        return { ok: res.ok, status: res.status, out };
      }
      function esc(s){
        return String(s||"")
          .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
          .replaceAll('"',"&quot;").replaceAll("'","&#39;");
      }
      function applyFilter(){
        const q = (qs('#searchQ').value || '').trim().toLowerCase();
        const rows = !q ? bookings : bookings.filter((b)=> `${b.customer_name||''} ${b.customer_email||''} ${b.package_code||''} ${b.vehicle_size||''} ${b.assigned_to||b.assigned_staff_name||''}`.toLowerCase().includes(q));
        renderRows(rows);
      }
      function renderRows(rows){
        qs('#count').textContent = `${rows.length} bookings`;
        const tb = qs('#rows');
        if (!rows.length) {
          tb.innerHTML = '<tr><td colspan="6" class="muted">No matching bookings.</td></tr>';
          return;
        }
        tb.innerHTML = rows.map((b)=>`
          <tr>
            <td class="mono">${esc(b.service_date||'')}</td>
            <td class="mono">${esc(b.start_slot||'')}${Number(b.duration_slots)===2 ? '+PM' : ''}</td>
            <td>
              <div><strong>${esc(b.customer_name||'Customer')}</strong></div>
              <div class="muted mini">${esc(b.customer_email || '')}</div>
            </td>
            <td class="mono">${esc(b.package_code||'')}/${esc(b.vehicle_size||'')}</td>
            <td><input class="small" data-assign-input value="${esc(b.assigned_staff_name || b.assigned_to || '')}" placeholder="Name (e.g., Laurie)" /></td>
            <td><button class="btn ghost" data-save="${esc(b.id)}">Save</button></td>
          </tr>
        `).join('');
        tb.querySelectorAll('button[data-save]').forEach((btn)=>{
          btn.addEventListener('click', async ()=>{
            const booking_id = btn.getAttribute('data-save');
            const input = btn.closest('tr').querySelector('input[data-assign-input]');
            const assigned_to = (input.value || '').trim();
            btn.disabled = true;
            const r2 = await postJson('/api/admin/assign_booking', { booking_id, assigned_to, assigned_staff_name: assigned_to });
            btn.disabled = false;
            qs('#raw').textContent = JSON.stringify(r2.out || {}, null, 2);
            if (!r2.ok || !r2.out?.ok) return show(r2.out?.error || `Error (HTTP ${r2.status})`, 'bad');
            show('Saved.', 'ok');
            setTimeout(hide, 800);
            await loadBookings();
          });
        });
      }
      async function loadBookings(){
        hide();
        qs('#loadBtn').disabled = true;
        qs('#loadBtn').textContent = 'Loading…';
        const r = await postJson('/api/admin/bookings', {});
        qs('#loadBtn').disabled = false;
        qs('#loadBtn').textContent = 'Load bookings';
        qs('#raw').textContent = JSON.stringify(r.out || {}, null, 2);
        if (!r.ok || !r.out?.ok) return show(r.out?.error || `Error (HTTP ${r.status})`, 'bad');
        bookings = Array.isArray(r.out.bookings) ? r.out.bookings : Array.isArray(r.out.rows) ? r.out.rows : [];
        applyFilter();
        show('Loaded.', 'ok');
        setTimeout(hide, 800);
      }
      qs('#loadBtn').addEventListener('click', loadBookings);
      qs('#searchQ').addEventListener('input', applyFilter);
      window.AdminShell.boot({
        pageKey:'bookings',
        onReady: async ({ actor }) => {
          qs('#actorBox').textContent = actor ? `Signed in as ${actor.full_name || actor.email || 'staff'}` : 'No signed-in staff session detected.';
          await loadBookings();
        }
      });
    })();
  </script>
  <script type="module" src="/assets/chrome.js?v=20260403a"></script>
</body>
</html>
