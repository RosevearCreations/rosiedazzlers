<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pricing | Rosie Dazzlers</title>
  <meta name="description" content="Transparent pricing by vehicle size." />
  <link rel="stylesheet" href="/assets/site.css" />
</head>
<body>
  <div class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <img data-logo alt="Rosie Dazzlers logo" />
        <strong>Rosie Dazzlers</strong>
      </a>
      <div class="nav-links">
        <a href="/services">Services</a>
        <a href="/pricing">Pricing</a>
        <a href="/gear">Gear</a>
        <a href="/consumables">Consumables</a>
        <a href="/book">Book</a>
      </div>
      <a class="btn primary" href="/book">Book now</a>
    </div>
  </div>

  <div class="container">
    <div class="panel">
      <h1 style="margin:0 0 6px">Pricing</h1>
      <p class="help">This page uses your exact chart prices (Small / Mid / Oversize).</p>

      <div class="hr"></div>

      <div class="row">
        <div>
          <label for="size">Vehicle size</label>
          <select id="size">
            <option value="small">Small</option>
            <option value="mid">Mid-sized</option>
            <option value="oversize">Oversize / Exotics</option>
          </select>
        </div>
        <div style="display:flex;gap:10px;align-items:end;justify-content:flex-end">
          <button class="btn ghost" type="button" id="openSize">Size chart</button>
          <button class="btn ghost" type="button" id="openIncludes">Includes</button>
          <button class="btn ghost" type="button" id="openPrice">Price chart</button>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Packages</h2>
      <div id="pricingCards" class="grid cards"></div>
    </div>

    <div class="footer" data-footer></div>
  </div>

  <script type="module">
    import { setBrandImages, setFooter, renderPackageCards, openLightbox } from "/assets/site.js";
    import { PATHS, CHARTS, assetUrl } from "/assets/config.js";

    setBrandImages(); setFooter();

    const sizeSel = document.querySelector("#size");
    const render = () => renderPackageCards("#pricingCards", sizeSel.value);
    sizeSel.addEventListener("change", render);
    render();

    document.querySelector("#openSize").addEventListener("click", () => {
      openLightbox("Vehicle Size Chart", assetUrl(PATHS.packages, CHARTS.size));
    });
    document.querySelector("#openIncludes").addEventListener("click", () => {
      openLightbox("What’s Included", assetUrl(PATHS.packages, CHARTS.includes));
    });
    document.querySelector("#openPrice").addEventListener("click", () => {
      openLightbox("Price Chart", assetUrl(PATHS.packages, CHARTS.price));
    });
  </script>
</body>
</html>
