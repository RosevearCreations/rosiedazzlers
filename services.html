<script type="module">
function buildAddonCard(addon){
  const imageUrl = addonPrimaryImage(addon) || ADDON_IMAGES[addon.code] || null;
  const fallbackUrl = addonFallback(addon.code);

  const el = document.createElement("div");
  el.className = "panel";

  const price =
    addon.quote_required ? null :
    (addon.prices_cad?.[sizeKey()] ?? addon.price_cad ?? null);

  const badge = addon.quote_required
    ? `<span class="tag warn">Quote required</span>`
    : `<span class="tag ok">${price != null ? money(price) : "$—"}</span>`;

  el.innerHTML = `
    ${imageUrl ? `<img class="cardImg" alt="${escapeHtml(addon.name)}" />` : ``}
    <div style="margin-top:${imageUrl ? "10px":"0"};display:flex;justify-content:space-between;gap:10px;align-items:flex-start">
      <div>
        <h3 style="margin:0">${escapeHtml(addon.name)}</h3>
      </div>
      <div style="text-align:right">${badge}</div>
    </div>
    <div class="muted mini" style="margin-top:10px">
      ${addon.quote_required ? "Requested online, priced after inspection." : "Optional add-on service."}
    </div>
  `;

  const imgEl = el.querySelector("img");
  if (imgEl){
    imgEl.src = imageUrl;
    imgEl.loading = "lazy";
    imgEl.decoding = "async";
    imgEl.onerror = ()=>{
      if (fallbackUrl && imgEl.src !== new URL(fallbackUrl, window.location.origin).href) {
        imgEl.src = fallbackUrl;
        return;
      }
      imgEl.style.display = "none";
    };
  }

  return el;
}
</script>
