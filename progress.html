<!-- /progress.html
     REPLACE ENTIRE FILE

     Customer progress page:
     - Customer arrives via link like: /progress?bid=<booking_id>
     - Shows PUBLIC progress updates only
     - Calls: POST /api/progress_list_public (we create next)

     Notes:
     - No login required yet (simple share-link model)
     - Later we can secure this by requiring:
         booking_id + customer_email match, or an auth account
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Progress | Rosie Dazzlers</title>
  <meta name="description" content="Follow your vehicle detailing progress." />
  <link rel="stylesheet" href="/assets/site.css?v=20260311q" />
  <style>
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .muted{color:rgba(234,242,255,.62)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
    .cardImg{
      width:100%;
      aspect-ratio:16/10;
      object-fit:cover;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
    }
    .mini{font-size:.92rem}
  </style>
</head>

<body>
  <div class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <img data-logo alt="Rosie Dazzlers logo" />
        <strong>Rosie Dazzlers</strong>
      </a>
      <button class="btn small ghost nav-toggle" id="navToggle" type="button" aria-expanded="false">Menu</button>
      <div class="nav-links" id="navLinks"></div>
      <a class="btn primary" href="/book">Book</a>
    </div>
  </div>

  <div class="container">
    <div class="panel">
      <h1 style="margin:0 0 6px">Detailing Progress</h1>
      <p class="kicker" style="margin:0">
        Live updates posted by our team during your detail.
      </p>

      <div class="hr"></div>

      <div class="row">
        <label style="display:flex;flex-direction:column;gap:6px;min-width:340px;flex:1">
          <span class="muted">Booking ID (from your link)</span>
          <input id="bid" class="mono" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
        </label>

        <div class="row" style="align-items:flex-end">
          <button class="btn primary" id="loadBtn" type="button">Load progress</button>
        </div>
      </div>

      <div id="status" class="notice" style="display:none;margin-top:12px"></div>
    </div>

    <div class="section">
      <div id="updatesBox"></div>
    </div>

    <div class="footer" data-footer></div>
  </div>

  <script type="module">
    const qs = (s)=>document.querySelector(s);

    function show(msg, kind=""){
      const el = qs("#status");
      el.style.display = "block";
      el.className = "notice " + (kind || "");
      el.textContent = msg;
    }
    function hide(){ qs("#status").style.display = "none"; }

    function esc(s){
      return String(s||"")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#39;");
    }

    async function postJson(url, payload){
      const res = await fetch(url, {
        method: "POST",
        headers: { "content-type":"application/json" },
        body: JSON.stringify(payload),
      });
      const out = await res.json().catch(()=>null);
      return { ok: res.ok, status: res.status, out };
    }

    function renderUpdates(items){
      const box = qs("#updatesBox");
      box.innerHTML = "";

      if (!items.length){
        box.innerHTML = `<div class="panel"><div class="notice warn">No updates yet.</div></div>`;
        return;
      }

      for (const u of items){
        const card = document.createElement("div");
        card.className = "panel";
        card.style.marginTop = "12px";

        const img = u.photo_url
          ? `<img class="cardImg" alt="Progress photo" src="${esc(u.photo_url)}" loading="lazy" decoding="async" />`
          : "";

        card.innerHTML = `
          ${img}
          <div style="margin-top:${img ? "10px":"0"}">
            <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap">
              <strong>${esc(u.stage || "update")}${u.progress_percent!=null ? " — " + esc(u.progress_percent) + "%" : ""}</strong>
              <span class="muted mini mono">${esc(u.created_at || "")}</span>
            </div>
            ${u.note ? `<div class="muted" style="margin-top:8px">${esc(u.note)}</div>` : ``}
          </div>
        `;

        const imgEl = card.querySelector("img");
        if (imgEl) imgEl.onerror = ()=>{ imgEl.style.display = "none"; };

        box.appendChild(card);
      }
    }

    async function load(){
      hide();
      const bid = (qs("#bid").value || "").trim();
      if (!bid) return show("Missing booking id.", "bad");

      qs("#loadBtn").disabled = true;
      qs("#loadBtn").textContent = "Loading…";

      const r = await postJson("/api/progress_list_public", { booking_id: bid, limit: 50 });

      qs("#loadBtn").disabled = false;
      qs("#loadBtn").textContent = "Load progress";

      if (!r.ok || !r.out?.ok){
        return show(r.out?.error ? `Error: ${r.out.error}` : `Error (HTTP ${r.status})`, "bad");
      }

      renderUpdates(Array.isArray(r.out.rows) ? r.out.rows : []);
      show("Loaded.", "ok");
      setTimeout(hide, 700);
    }

    qs("#loadBtn").addEventListener("click", load);

    // Prefill from query string: /progress?bid=...
    (function prefill(){
      const p = new URLSearchParams(location.search);
      const bid = (p.get("bid") || "").trim();
      if (bid) {
        qs("#bid").value = bid;
        load();
      }
    })();
  </script>

  <script type="module" src="/assets/chrome.js?v=20260311q"></script>
</body>
</html>
