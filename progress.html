<!-- /progress.html
     Customer progress page (no login yet). Uses a token in the URL:
     /progress?token=UUID
     Pulls customer-safe updates + photos from /api/progress/view
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Progress | Rosie Dazzlers</title>
  <meta name="description" content="View your vehicle detailing progress." />
  <link rel="stylesheet" href="/assets/site.css?v=20260309d" />
  <style>
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .muted{color:rgba(234,242,255,.62)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
    .media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .media-item img{width:100%;height:auto;border-radius:14px;border:1px solid rgba(255,255,255,.10)}
    .tag{display:inline-flex;align-items:center;gap:6px;padding:2px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);font-size:.9rem}
    @media (max-width:980px){ .grid2{grid-template-columns:1fr} .media-grid{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <img data-logo alt="Rosie Dazzlers logo" />
        <strong>Rosie Dazzlers</strong>
      </a>
      <button class="btn small ghost nav-toggle" id="navToggle" type="button" aria-expanded="false">Menu</button>
      <div class="nav-links" id="navLinks"></div>
      <a class="btn primary" href="/book">Book now</a>
    </div>
  </div>

  <div class="container">
    <div class="panel">
      <h1 style="margin:0 0 6px">Detailing Progress</h1>
      <p class="kicker" style="margin:0">Updates and photos posted during your appointment.</p>
      <div id="tokenNote" class="notice warn" style="margin-top:12px;display:none"></div>
    </div>

    <div class="section grid2">
      <div class="panel">
        <h2 style="margin-top:0">Booking</h2>
        <div id="bookingBox" class="notice" style="display:none"></div>
        <div id="bookingErr" class="notice bad" style="display:none"></div>

        <div class="hr"></div>

        <h2>Updates</h2>
        <div id="updatesBox"></div>
      </div>

      <div class="panel">
        <h2 style="margin-top:0">Photos</h2>
        <div id="mediaBox"></div>
      </div>
    </div>

    <div class="footer" data-footer></div>
  </div>

  <script type="module">
    const qs = (s) => document.querySelector(s);

    function escapeHtml(s){
      return String(s||"")
        .replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;").replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function fmtWhen(iso){
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }

    function kindTag(kind){
      const k = String(kind||"other");
      return `<span class="tag">${escapeHtml(k)}</span>`;
    }

    const params = new URLSearchParams(location.search);
    const token = (params.get("token") || "").trim();

    if (!token) {
      qs("#tokenNote").style.display = "block";
      qs("#tokenNote").innerHTML = `Missing token. Use a link like <span class="mono">/progress?token=UUID</span>.`;
    } else {
      qs("#tokenNote").style.display = "block";
      qs("#tokenNote").innerHTML = `Viewing progress for token: <span class="mono">${escapeHtml(token)}</span>`;
    }

    async function load() {
      if (!token) return;

      const res = await fetch(`/api/progress/view?token=${encodeURIComponent(token)}`, { cache: "no-store" });
      const data = await res.json().catch(()=>null);

      if (!res.ok || !data?.ok) {
        qs("#bookingErr").style.display = "block";
        qs("#bookingErr").textContent = data?.error ? `Error: ${data.error}` : "Could not load progress.";
        return;
      }

      // booking
      const b = data.booking || {};
      const v = b.vehicle || {};
      const vehicleLine = [v.year, v.make, v.model].filter(Boolean).join(" ");

      qs("#bookingBox").style.display = "block";
      qs("#bookingBox").innerHTML = `
        <div><strong>Date:</strong> ${escapeHtml(b.service_date)} ${escapeHtml(b.start_slot || "")}</div>
        <div><strong>Service:</strong> ${escapeHtml(b.package_code || "")} (${escapeHtml(b.vehicle_size || "")})</div>
        <div><strong>Vehicle:</strong> ${escapeHtml(vehicleLine || "(not set)")}</div>
        <div><strong>Status:</strong> ${escapeHtml(b.status || "")}</div>
      `;

      // updates
      const updates = Array.isArray(data.updates) ? data.updates : [];
      if (!updates.length) {
        qs("#updatesBox").innerHTML = `<div class="muted">No updates posted yet.</div>`;
      } else {
        qs("#updatesBox").innerHTML = updates.map(u => `
          <div class="notice" style="margin-top:10px">
            <div class="muted">${escapeHtml(fmtWhen(u.created_at))}${u.created_by ? ` · ${escapeHtml(u.created_by)}` : ""}</div>
            <div style="margin-top:6px">${escapeHtml(u.note)}</div>
          </div>
        `).join("");
      }

      // media
      const media = Array.isArray(data.media) ? data.media : [];
      if (!media.length) {
        qs("#mediaBox").innerHTML = `<div class="muted">No photos posted yet.</div>`;
      } else {
        qs("#mediaBox").innerHTML = `
          <div class="media-grid">
            ${media.map(m => `
              <div class="media-item">
                <a href="${escapeHtml(m.media_url)}" target="_blank" rel="noopener">
                  <img src="${escapeHtml(m.media_url)}" alt="Progress photo" loading="lazy" decoding="async" />
                </a>
                <div class="muted" style="margin-top:6px">
                  ${kindTag(m.kind)} ${m.caption ? ` · ${escapeHtml(m.caption)}` : ""}
                </div>
              </div>
            `).join("")}
          </div>
        `;
      }
    }

    await load();
  </script>

  <script type="module" src="/assets/chrome.js?v=20260309d"></script>
</body>
</html>
