<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Rosie Dazzlers Reviews</title>
  <desc id="desc">Five-star Rosie Dazzlers review proof placeholder graphic for public pages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#10192b"/>
      <stop offset="100%" stop-color="#1a2740"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="110" y="120" width="1380" height="660" rx="38" fill="url(#card)" stroke="rgba(255,255,255,0.16)"/>
  </g>
  <text x="160" y="220" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700">Rosie Dazzlers Reviews</text>
  <text x="160" y="280" fill="#c8d7f2" font-family="Arial, Helvetica, sans-serif" font-size="30">Public review proof placeholder while the live review banner is refreshed.</text>
  <g transform="translate(160 350)">
    <g fill="#ffd15c">
      <path d="M60 0l18 37 41 6-30 29 7 41-36-19-36 19 7-41-30-29 41-6z"/>
      <path transform="translate(120 0)" d="M60 0l18 37 41 6-30 29 7 41-36-19-36 19 7-41-30-29 41-6z"/>
      <path transform="translate(240 0)" d="M60 0l18 37 41 6-30 29 7 41-36-19-36 19 7-41-30-29 41-6z"/>
      <path transform="translate(360 0)" d="M60 0l18 37 41 6-30 29 7 41-36-19-36 19 7-41-30-29 41-6z"/>
      <path transform="translate(480 0)" d="M60 0l18 37 41 6-30 29 7 41-36-19-36 19 7-41-30-29 41-6z"/>
    </g>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="#f4f8ff">
    <text x="160" y="525" font-size="34" font-weight="700">Why this block stays on the public pages</text>
    <text x="160" y="575" font-size="27">• Keeps review proof visible near service and pricing decisions</text>
    <text x="160" y="620" font-size="27">• Supports local trust signals alongside recent work and town pages</text>
    <text x="160" y="665" font-size="27">• Prevents broken image placeholders while the source graphic is replaced</text>
  </g>
  <text x="160" y="745" fill="#9fb4da" font-family="Arial, Helvetica, sans-serif" font-size="24">Rosie Dazzlers Mobile Auto Detailing • Oxford &amp; Norfolk Counties</text>
</svg>
